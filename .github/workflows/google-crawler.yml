name: Sovereign Google Indexing Crawler

on:
  schedule:
    # Runs at midnight every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  index-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit the last-indexing.json state back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Service Account JSON
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "Error: GCP_SERVICE_ACCOUNT_JSON secret is not set."
            exit 1
          fi
          echo "$GCP_SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Execute Google Indexing API Sweep
        run: npm run index

      - name: Ping IndexNow for Bing and Yandex
        run: curl -X POST https://joyville-homes.com/api/indexnow -H "Authorization: Bearer dev_secret"

      - name: Commit Updated Indexing State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if last-indexing.json has been modified
          if git diff --exit-code --quiet last-indexing.json; then
            echo "No new URLs indexed. State is unchanged."
          else
            git add last-indexing.json
            git commit -m "chore(seo): update google indexing api state [skip ci]"
            git push
            echo "Successfully updated indexing state."
          fi
